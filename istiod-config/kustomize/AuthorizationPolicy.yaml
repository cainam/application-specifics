apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: ext-authz
spec:
  action: CUSTOM
  provider:
    name: oauth2-proxy
  rules:
  - to:
    - operation:
        hosts:
        - "{{ net.base_domain }}"
        - "*.{{ net.base_domain }}"
        - "{{ net.domain_external }}":*
        notPaths:
        - /oauth2-hydra/callback
        - /hydra/*
        - /idp/*
  selector:
    matchLabels:
      istio: my-lb-adm13
