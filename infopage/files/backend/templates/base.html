<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://my-lb.adm13/infopage" target="_blank">
    <script>
    const currentUrl = window.location.href;


document.addEventListener('DOMContentLoaded', () => {
    const loadCallbacks = {
        software_callback: function(element) {
            load_sw_details(element);
        },
        flow_list_callback: function(element) {
            populateFilterOptions();
            filterTable();
        },
    };

    ItemElems = document.querySelectorAll("[itemprop='load']");
    for (let i = 0; i < ItemElems.length; i++) {
        const elem = ItemElems[i];
        const value = elem.getAttribute('value');
        const callbackName = value + '_callback';

        if (callbackName in loadCallbacks) {
            const observer = new MutationObserver((mutations, obs) => {
                obs.disconnect();
                loadCallbacks[callbackName](elem);
            });
            observer.observe(elem, { childList: true });
        }

        fetch(currentUrl + "/" + value)
            .then(response => response.text())
            .then(html => { elem.innerHTML = html; })
            .catch(error => { console.log(error); });
    }
});

function populateFilterOptions() {
    const rows = document.querySelectorAll(".flow-row");
    const select = document.getElementById("verdictFilter");
    const uniqueVerdicts = new Set();

    // Gather all unique verdicts from the rendered data
    rows.forEach(row => {
        const verdict = row.getAttribute("data-verdict").trim();
        if (verdict) {
            uniqueVerdicts.add(verdict);
        }
    });

    // Dynamically add unique values to the spreadsheet filter
    uniqueVerdicts.forEach(verdict => {
        const option = document.createElement("option");
        option.value = verdict;
        option.textContent = verdict;
        select.appendChild(option);
    });
}

function filterTable() {
    const selectedValue = document.getElementById("verdictFilter").value;
    const rows = document.querySelectorAll(".flow-row");
console.log("filterTable: selectedValue: "+selectedValue);
    rows.forEach(row => {
        const rowVerdict = row.getAttribute("data-verdict").trim();

        if (selectedValue === "ALL") {
            row.style.display = ""; // Show everything
        } else {
            if (rowVerdict === selectedValue) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        }
    });
}

function load_sw_details(element){
  console.log("sw details"+element);
  inner_elems = element.querySelectorAll("[itemprop='inner_load']");
  for (let i = 0; i < inner_elems.length; i++) {
    console.log("load: "+inner_elems[i].getAttribute('value'));
    fetch(currentUrl+"/software"+"?software="+inner_elems[i].getAttribute('value'))
    .then(response => response.text())
      .then(html => {inner_elems[i].innerHTML = html;})
      .catch(error => {console.log(error);})
  }
}

async function trigger_backend(endpoint, data, dest = undefined){
  extend_url = currentUrl.endsWith("/") ? "" : "/";
  const response = await fetch(currentUrl+extend_url+endpoint, { method: 'post',
    body: JSON.stringify(data),
    headers: { 'Content-type': 'application/json; charset=UTF-8', }
  })
  const htmlContent = await response.text();

  if (dest !== undefined) {
    console.log("dest specified, content:",htmlContent);
    const jsonObject = JSON.parse(htmlContent);
    const targetDiv = document.querySelector('.tab-section[data-dest='+dest+']');
    targetDiv.textContent = JSON.stringify(jsonObject, null, 2);;
  }
}
    </script>

    {% endblock %}

    {% endblock %}
</head>

<body>
    {% block content %}
    {% endblock %}

<script>
const dContainer = document.querySelector('#TabsSystem');

dContainer.querySelectorAll('.TabButton').forEach(tab => {
  tab.onclick = () => {
    const targetTab = tab.dataset.tab;

    // 1. Remove 'active' class from all buttons and set it on the clicked one
    dContainer.querySelectorAll('.TabButton').forEach(b => b.classList.remove('active'));
    tab.classList.add('active');

    // 2. Remove 'active' class from all content sections and add it only to the matching ones
    dContainer.querySelectorAll('.tab-section').forEach(section => {
      if (section.dataset.tab === targetTab) {
        section.classList.add('active');
      } else {
        section.classList.remove('active');
      }
    });
  };
});
</script>

</body>
