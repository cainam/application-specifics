{% extends "base.html" %}

{% block title %}
  <title>Infopage Dashboard</title>
{% endblock %}

{% block content %}
  <div class="container" id="TabsSystem">
    <div class="nav-wrapper">
      <div class="tab-navigation">
        <div class="TabButton active" data-tab="software">Software</div>
        <div class="TabButton" data-tab="services">Services</div>
        <div class="TabButton" data-tab="status">Status</div>
        <div class="TabButton" data-tab="flows">Flows</div>
      </div>
    </div>

    <div class="content-container d-flex-col">

      <div class="d-flex content-row">
        <div class="tab-section active card" data-tab="software" itemprop="load" value="registry_images"></div>
        <div class="tab-section active card" data-tab="software" itemprop="load" value="software"></div>
      </div>

      <div class="d-flex content-row">
        <div class="tab-section card" data-tab="services" itemprop="load" value="virtual_services"></div>
      </div>

      <div class="d-flex-col content-row">
        <div class="d-flex layout-split">
          <div class="tab-section card" data-tab="status" itemprop="load" value="node_status"></div>
          <div class="tab-section card" data-tab="status" itemprop="load" value="test_results"></div>
        </div>
        <div class="tab-section card" data-tab="status" itemprop="load" value="services_status"></div>
      </div>

      <div class="d-flex-col content-row">
        <div class="d-flex">
          <div class="tab-section card" data-tab="flows" itemprop="load" value="flow_list"></div>
          <div class="tab-section card json-block" data-tab="flows" data-dest="flows"></div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}

{% block style %}
<style>
/* --- Design Variables --- */
:root {
  --bg-main: #f8fafc;
  --card-bg: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --accent: #4f46e5;         /* Indigo accent */
  --accent-hover: #e0e7ff;
  --border-color: #e2e8f0;

  /* Relative Radii */
  --radius-lg: 0.75rem;      /* Scales with root font size */
  --radius-md: 0.5rem;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

/* --- Layout Utilities --- */
.container {
  width: 100%;
  height: 100vh;
  margin: 0 auto;
  font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.content-container {
  flex: 1;
  overflow-y: auto;
  min-height: 0;           /* critical for flex children to scroll correctly */
}

.d-flex {
  display: flex;
  gap: 1.5rem;
}

.d-flex-col {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.layout-split > .tab-section {
  flex: 1;
}

/* --- Segmented Control (Tabs) --- */
.nav-wrapper {
  display: flex;
  margin-bottom: 1.5rem;
  flex-shrink: 0;
}

.json-block {
    white-space: pre-wrap;
    font-family: monospace; /* Makes it look like code */
    background-color: #f4f4f4;
    padding: 0.625rem;
}

.tab-navigation {
  display: inline-flex;
  background-color: #f1f5f9;
  padding: 0.25rem;
  border-radius: var(--radius-md);
  border: 0.0625rem solid var(--border-color); /* 1px equivalent in rem */
}

#TabsSystem .TabButton {
  color: var(--text-muted);
  border: none;
  background: transparent;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 0.5rem 1.25rem;    /* Generous relative padding inside the track */
  border-radius: 0.375rem;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}

#TabsSystem .TabButton:hover {
  color: var(--text-main);
}

/* --- Active Tab State --- */
#TabsSystem .TabButton.active {
  background-color: var(--card-bg);
  color: var(--accent);
  /* Box shadow values converted to relative measures */
  box-shadow: 0 0.0625rem 0.1875rem rgba(0, 0, 0, 0.1), 0 0.0625rem 0.125rem rgba(0, 0, 0, 0.06);
}

/* --- Tab Content Filtering Visibility --- */
.tab-section {
  display: none;
  width: 100%;
}

.tab-section.active {
  display: block;
}

/* Avoid raw flex layout breaking when dynamic content hidden/shown */
.content-row {
  display: none;
}
.content-row:has(.tab-section.active) {
  display: flex;
}

/* --- Dynamic Content Card Panels --- */
.card {
  background-color: var(--card-bg);
  border: 0.0625rem solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  box-shadow: 0 0.0625rem 0.1875rem 0 rgba(0, 0, 0, 0.05);
}

/* --- Fallback Global Table Styling within Cards --- */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 0.5rem;
}

table th {
  background-color: #f8fafc;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;     /* Native letter tracking using em sizing */
  padding: 0.75rem 1rem;
  border-bottom: 0.0625rem solid var(--border-color);
  text-align: left;
}

table td {
  padding: 0.875rem 1rem;
  color: var(--text-main);
  font-size: 0.92rem;
  border-bottom: 0.0625rem solid var(--border-color);
}

table tr:last-child td {
  border-bottom: none;
}

table tr:hover td {
  background-color: #f8fafc;
}
</style>
{% endblock %}
