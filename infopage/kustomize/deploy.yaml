apiVersion: apps/v1
kind: Deployment
{% set internal_port = 65536|random(1024) -%}
metadata:
  name: {{ kustom.name }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ kustom.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ kustom.name }}
    spec:
      containers:
      - args:
        - -m
        - uvicorn
        - infopage.main:app
        - --host
        - 0.0.0.0
        - --port
        - "{{ internal_port }}"
        - --reload
        command:
        - python
        env:
        - name: FLOWS_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ kustom.name }}
              key: flows_private.pem
        - name: ETCD_CA_CRT
          valueFrom:
            secretKeyRef:
              name: {{ kustom.name }}
              key: etcd_ca.crt
        - name: ETCD_CLIENT_CRT
          valueFrom:
            secretKeyRef:
              name: {{ kustom.name }}
              key: etcd_client.crt
        - name: ETCD_CLIENT_KEY
          valueFrom:
            secretKeyRef:
              name: {{ kustom.name }}
              key: etcd_client.key
        image: {{ kustom.image }}
        workingDir: /app/backend
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /check
            port: infopage
            scheme: HTTP
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 3
        name: infopage
        ports:
        - containerPort: {{ internal_port }}
          name: infopage
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /check
            port: infopage
            scheme: HTTP
          periodSeconds: 30
          successThreshold: 1
          timeoutSeconds: 3
        securityContext:
          runAsUser: {{ kustom.security.runAsUser }}
        volumeMounts:
        - mountPath: /app
          name: infopage
        - name: ca-bundle
          mountPath: /certs
      serviceAccountName: {{ kustom.name }}
      volumes:
      - name: infopage
        persistentVolumeClaim:
          claimName: infopage
      - name: ca-bundle
        configMap:
              name: {{ kustom.name }}-certs

