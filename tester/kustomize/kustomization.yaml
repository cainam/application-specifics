namespace: {{ kustom.namespace }}

resources:
- CronJob.yaml
- RoleBinding.yaml
- Role.yaml
- ServiceAccount.yaml

configMapGenerator:
- name: {{ kustom.name }}-certs
  literals:
  - |
    service-ca-bundle.crt={{ application_playbooks[application.key].vars.ca_bundle | indent(4) }}

- name: {{ kustom.name }}
  literals:
  - etc-passwd="{{ kustom.name }}:x:{{ kustom.security.runAsUser }}:{{ kustom.security.runAsGroup }}:,,,:/home/{{ kustom.name }}:/bin/bash"
  - etc-group="{{ kustom.name }}:x:{{ kustom.security.runAsGroup }}:"
  - etc-subuid="{{ kustom.name }}:100000:65536"
  - etc-subgid="{{ kustom.name }}:100000:65536"
  - |
    molecule.yaml=
    ---
    dependency:
      name: galaxy
      enabled: false
    driver:
      name: podman
      options:
        managed: true
    platforms:
      - name: instance
        image: {{  kustom.images['molecule-tester'] }}
        etc_hosts:
          "molecule-instance": "127.0.0.1"
        pre_build_image: true
        network: host
        security_opts:
          - seccomp=unconfined
    provisioner:
      name: ansible
      config_options:
        defaults:
          fact_caching: jsonfile
          fact_caching_connection: ${PWD}/tmp/ansible_cache
          gather_facts: true
          # Ensures the engine knows to load the junit plugin
          callbacks_enabled: junit
          local_tmp: ${PWD}/tmp
          remote_tmp: ${PWD}/tmp
    verifier:
      name: ansible

secretGenerator:
- name: {{ kustom.name }}
  literals:
  - |
    key={{ ssh_keys.podman.key | indent(4) }}
  - known_hosts=@cert-authority {{ inventory_hostname }},{% for l in net.virtual_ips %}{{ l.ip }}{% for n in l.names %},{{ n }}{%endfor %}{% endfor %} {{ application_playbooks[application.key].vars.ca_ssh }}

generatorOptions:
  disableNameSuffixHash: true
