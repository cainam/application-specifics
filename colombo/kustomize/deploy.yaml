apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ kustom.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ kustom.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ kustom.name }}
    spec:
      shareProcessNamespace: true # this allows to access the process of suricata from another container
      securityContext:
        fsGroup: {{ kustom.security.runAsGroup }}
      volumes:
      - name: {{ kustom.name }}
        persistentVolumeClaim:
          claimName: {{ kustom.name }}
      - name: suricata-logs
        emptyDir: {}
      - name: shared-pipe
        emptyDir: {}
      - name: suricata-config
        configMap:
          name: suricata-config
      - name: {{ kustom.name }}-config
        configMap:
          name: {{ kustom.name }}
      containers:
        - name: stream-capture
          image: myregistry.adm13:443/local/shark:20260429
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -x
              # TRAFFIC_FILTER="not (src net (10.0.0.0/8 or 172.16.0.0/12 or 192.168.0.0/16) and dst net (10.0.0.0/8 or 172.16.0.0/12 or 192.168.0.0/16))"
              IFACE="1-lan" # LAN IFACE="2-0"  # WAN #IFACE="internet"?
              SID='0000000000000000'
              valid_sid(){
                sid="$1"
                u="$2"
                p="$3"
                echo "Trying to login into $FRITZ_IP as user $u" >&2
                sid_status=$(curl -s "$FRITZ_IP/login_sid.lua?sid=${sid}" | awk -F'</?SID>' 'NF>1{print $2}')
                if [ ${sid_status} = '0000000000000000' ]; then
                  CHALLENGE=$(curl -k -s $FRITZ_IP/login_sid.lua |  grep -o "<Challenge>[a-z0-9]\{8\}" | cut -d'>' -f 2)
                  HASH=$(printf "%s-%s" "$CHALLENGE" "$p" | iconv -t UTF-16LE | md5sum | cut -d' ' -f1)
                  sid=$(curl -k -s "$FRITZ_IP/login_sid.lua" -d "response=$CHALLENGE-$HASH" -d 'username='${u} | grep -o "<SID>[a-z0-9]\{16\}" | cut -d'>' -f 2)
                  echo "${sid}" | grep ^0+$ && echo "Login failed. Did you create & use explicit Fritz!Box users?" >&2 && exit 1
                fi
                echo "${sid}"
              }
              echo "Capturing traffic on Fritz!Box interface $IFACE ..." 1>&2
              SID=$(valid_sid ${SID} $FRITZ_USER $FRITZ_PASS)
              curl -X POST "http://fritz.box/capture.lua" -d "sid=$SID" -d "capture=eth0" -d "stop=1"
              umask 0002
              mkdir /data/pcaps
              while sleep 5; do
                FILE="/data/pcaps/fritz-$(date +%s).pcap"
                SID=$(valid_sid ${SID} $FRITZ_USER $FRITZ_PASS)
                URL="$FRITZ_IP/cgi-bin/capture_notimeout?ifaceorminor=$IFACE&snaplen=&capture=Start&sid=$SID"
                curl --no-buffer -v "$URL" | tcpdump -r - -w "$FILE" -C 20
                [ -f "$FILE" ] && [ ! -s "$FILE" ] && rm -fv "$FILE"
              done
          env:
            - name: FRITZ_IP
              value: "http://fritz.box"
            - name: FRITZ_USER
              valueFrom:
                secretKeyRef:
                  name: {{ kustom.name }}
                  key: username
            - name: FRITZ_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ kustom.name }}
                  key: password
          volumeMounts:
            - name: shared-pipe
              mountPath: /data
        - name: suricata-ids
          image: myregistry.adm13:443/local/suricata:20260521
          workingDir: /data
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /var/log/suricata/
              while [ ! -d /data/pcaps ]; do echo "Waiting for directory ..."; sleep 1; done
              rm -f /var/log/suricata/* /data/pcaps/*
              while true; do
                echo "Suricata listening to pipe..."
                suricata --pcap-file-continuous -r /data/pcaps/ -c /etc/suricata/suricata.yaml -l /var/log/suricata/
                echo "Pipe closed or Suricata restarted. Reloading in 2 seconds..."
                sleep 2
              done
          securityContext:
            runAsUser: {{ kustom.security.runAsUser }}
          volumeMounts:
          - name: shared-pipe
            mountPath: /data
          - name: {{ kustom.name }}
            mountPath: /var/log
        - name: cleanup-pcaps
          image: myregistry.adm13:443/local/python3:20260521
          env:
          - name: SURICATA_LOG
            value: /var/log/suricata/suricata.log
          - name: PCAP_DIR
            value: /data/pcaps
          - name: INTERVAL
            value: "900"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -x
              while sleep "${INTERVAL}"; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Running cleanup..."
                last_processed=$(tail -n 100 "${SURICATA_LOG}" | grep "Processed file" | tail -n 1 | sed 's/.*Processed file \(.*\),.*/\1/')
                if [ -z "${last_processed}" ]; then
                  echo "No processed files found in last 100 lines of suricata.log, skipping."
                elif [ ! -f "${last_processed}" ]; then
                  echo "Last processed file already deleted: ${last_processed}, skipping."
                else
                  echo "Last processed: ${last_processed}"
                  find "${PCAP_DIR}" -name "*.pcap*" ! -newer "${last_processed}" -print -delete
                fi
              done
          volumeMounts:
          - name: shared-pipe
            mountPath: /data
          - name: {{ kustom.name }}
            mountPath: /var/log
        - name: process-suricata-alerts
          image: myregistry.adm13:443/local/python3:20260521
          command: ["python", "/app/{{ kustom.name }}.py"]
          securityContext:
            runAsUser: {{ kustom.security.runAsUser }}
          volumeMounts:
          - mountPath: /app/{{ kustom.name }}.py
            name: {{ kustom.name }}-config
            subPath: process_suricata_alerts.py
          - name: {{ kustom.name }}
            mountPath: /var/log
        - name: spider-collect
          image: myregistry.adm13:443/local/spider-collect:20260521
          env:
          - name: SURICATA_FLOWS
            value: /var/log/suricata/flows
          - name: ENRICHED_FLOWS
            value: /var/log/suricata/flows-enriched
          - name: INTERVAL
            value: "90"
          - name: ANTHROPIC_BASE_URL
            value: https://openrouter.ai/api
          - name: ANTHROPIC_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: openrouter
          - name: ABUSEIPDB_KEY
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: abuseipdb
          - name: GROQ
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: groq
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -x
              instructions="You are a network security analyst. Explain the following Suricata flow in plain language. Focus on:
              - What triggered the alert
              - What device initiated the connection and where to
              - Whether this looks like a genuine threat or a false positive
              - What action if any should be taken

              Flow data:"
              mkdir -p ${ENRICHED_FLOWS}
              while sleep "${INTERVAL}"; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Asking AI..."
                touch "${ENRICHED_FLOWS}/ts" && sleep 5
                for flow in $(find "${SURICATA_FLOWS}/" -type f ! -newer "${ENRICHED_FLOWS}/ts"); do
                  [ -f "${flow}" ] || continue
                  base_flow=$(basename "${flow}")
                  payload=$(jq -n --arg system_content "$(echo "$instructions"; cat "$flow")" '{"model": "poolside/laguna-xs.2:free",
                    "messages": [{"role": "system", "content": $system_content}]
                  }')
                  curl ${ANTHROPIC_BASE_URL}/v1/chat/completions \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${ANTHROPIC_AUTH_TOKEN}" \
                    -H "HTTP-Referer: http://localhost:3000" \
                    -H "X-Title: My Batch Script" \
                    -d "$payload" | jq .  > "${ENRICHED_FLOWS}/${base_flow%.json}.ai-1.json"
                  payload=$(jq -n --arg system_content "$(echo "$instructions"; cat "$flow")" '{"model": "llama-3.3-70b-versatile",
                    "messages": [{"role": "system", "content": $system_content}]
                  }')
                  curl https://api.groq.com/openai/v1/chat/completions \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer ${GROQ}" \
                    -d "$payload" | jq .  > "${ENRICHED_FLOWS}/${base_flow%.json}.ai-2.json"
                  python3 /app/flow-information-collector.py "${flow}" "${ENRICHED_FLOWS}/${base_flow%.json}.enrichment.json"
                  mv "${flow}" "${ENRICHED_FLOWS}/"
                done
              done
          volumeMounts:
          - name: {{ kustom.name }}
            mountPath: /var/log
          - mountPath: /app/flow-information-collector.py
            name: {{ kustom.name }}-config
            subPath: flow-information-collector.py
        - name: api
          image: myregistry.adm13:443/local/fastapi:20260521
          env:
          - name: ENRICHED_FLOWS
            value: /var/log/suricata/flows-enriched
          - name: PYTHONPATH
            value: /py_env/lib/python3.13/site-packages/
          command: ["python", "-u",  "/app/api.py"]
          ports:
          - containerPort: 8000
            name: http
          volumeMounts:
          - name: {{ kustom.name }}
            mountPath: /var/log
          - mountPath: /app/api.py
            name: {{ kustom.name }}-config
            subPath: api.py
