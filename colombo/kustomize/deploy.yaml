{% set internal_port = 65536|random(1024) -%}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ kustom.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ kustom.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ kustom.name }}
    spec:
      shareProcessNamespace: true # this allows to access the process of suricata from another container
      securityContext:
        fsGroup: {{ kustom.security.runAsGroup }}
      volumes:
      - name: {{ kustom.name }}
        persistentVolumeClaim:
          claimName: {{ kustom.name }}
      - name: pcap-data
        emptyDir: {}
      - name: suricata-config
        configMap:
          name: suricata-config
      - name: {{ kustom.name }}-config
        configMap:
          name: {{ kustom.name }}
      containers:
        - name: stream-capture
          image: {{ kustom.images['shark'] }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -x
              IFACE="1-lan" # LAN IFACE="2-0"  # WAN #IFACE="internet"?
              SID='0000000000000000'
              valid_sid(){
                sid="$1"
                u="$2"
                p="$3"
                echo "Trying to login into $FRITZ_IP as user $u" >&2
                sid_status=$(curl -s "$FRITZ_IP/login_sid.lua?sid=${sid}" | awk -F'</?SID>' 'NF>1{print $2}')
                if [ ${sid_status} = '0000000000000000' ]; then
                  CHALLENGE=$(curl -k -s $FRITZ_IP/login_sid.lua |  grep -o "<Challenge>[a-z0-9]\{8\}" | cut -d'>' -f 2)
                  HASH=$(printf "%s-%s" "$CHALLENGE" "$p" | iconv -t UTF-16LE | md5sum | cut -d' ' -f1)
                  sid=$(curl -k -s "$FRITZ_IP/login_sid.lua" -d "response=$CHALLENGE-$HASH" -d 'username='${u} | grep -o "<SID>[a-z0-9]\{16\}" | cut -d'>' -f 2)
                  echo "${sid}" | grep ^0+$ && echo "Login failed. Did you create & use explicit Fritz!Box users?" >&2 && exit 1
                fi
                echo "${sid}"
              }
              echo "Capturing traffic on Fritz!Box interface $IFACE ..." 1>&2
              SID=$(valid_sid ${SID} $FRITZ_USER $FRITZ_PASS)
              curl -X POST "$FRITZ_IP/capture.lua" -d "sid=$SID" -d "capture=eth0" -d "stop=1"
              umask 0002
              mkdir /data/pcaps
              while sleep 5; do
                FILE="/data/pcaps/fritz-$(date +%s).pcap"
                SID=$(valid_sid ${SID} $FRITZ_USER $FRITZ_PASS)
                URL="$FRITZ_IP/cgi-bin/capture_notimeout?ifaceorminor=$IFACE&snaplen=&capture=Start&sid=$SID"
                curl --no-buffer -v "$URL" | tcpdump -r - -w "$FILE" -C 20
                [ -f "$FILE" ] && [ ! -s "$FILE" ] && rm -fv "$FILE"
              done
          env:
            - name: FRITZ_IP
              value: "http://{{ lookup('pipe', "getent hosts fritz.box | awk '{print $1}'") }}"
            - name: FRITZ_USER
              valueFrom:
                secretKeyRef:
                  name: {{ kustom.name }}
                  key: username
            - name: FRITZ_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ kustom.name }}
                  key: password
          volumeMounts:
            - name: pcap-data
              mountPath: /data
        - name: suricata
          image: {{ kustom.images['suricata'] }}
          workingDir: /data
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /var/log/suricata/
              while [ ! -d /data/pcaps ]; do echo "Waiting for directory ..."; sleep 1; done
              rm -f /var/log/suricata/* /data/pcaps/*
              grep -rh 'classtype:not-suspicious' /var/lib/suricata/rules/ | grep -v '^#' | sed 's/.*sid:\([0-9]*\).*/\1/' > /data/suppress_sids.txt
              grep -rh 'signature_severity Informational' /var/lib/suricata/rules/ | grep -v '^#' | grep 'alert_only' | sed 's/.*sid:\([0-9]*\).*/\1/' >> /data/suppress_sids.txt
              grep -rh 'signature_severity Informational' /var/lib/suricata/rules/ | grep -v '^#' | grep -v 'xbits:set' | sed 's/.*sid:\([0-9]*\).*/\1/' >> /data/suppress_sids.txt
              sort -u /data/suppress_sids.txt | awk '{print "suppress gen_id 1, sig_id " $1}' >> /data/threshold.conf
              while sleep 2; do
                echo "Suricata listening to pipe..."
                suricata --pcap-file-continuous -r /data/pcaps/ -c /etc/suricata/suricata.yaml -l /var/log/suricata/ --set threshold-file=/data/threshold.conf
                echo "Pipe closed or Suricata restarted. Reloading in 2 seconds..."
              done
          securityContext:
            runAsUser: {{ kustom.security.runAsUser }}
          volumeMounts:
          - name: pcap-data
            mountPath: /data
          - name: {{ kustom.name }}
            mountPath: /var/log
        - name: cleanup-pcaps
          image: {{ kustom.images['python3'] }}
          env:
          - name: SURICATA_LOG
            value: /var/log/suricata/suricata.log
          - name: PCAP_DIR
            value: /data/pcaps
          - name: INTERVAL
            value: "900"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -x
              while sleep "${INTERVAL}"; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Running cleanup..."
                last_processed=$(tail -n 100 "${SURICATA_LOG}" | grep "Processed file" | tail -n 1 | sed 's/.*Processed file \(.*\),.*/\1/')
                if [ -z "${last_processed}" ]; then
                  echo "No processed files found in last 100 lines of suricata.log, skipping."
                elif [ ! -f "${last_processed}" ]; then
                  echo "Last processed file already deleted: ${last_processed}, skipping."
                else
                  echo "Last processed: ${last_processed}"
                  find "${PCAP_DIR}" -name "*.pcap*" ! -newer "${last_processed}" -print -delete
                fi
              done
          volumeMounts:
          - name: pcap-data
            mountPath: /data
          - name: {{ kustom.name }}
            mountPath: /var/log
        - name: process-suricata-alerts
          image: {{ kustom.images['python3'] }}
          env:
          - name: FLOWS_DIR
            value: /var/log/flows
          command: ["python", "/app/{{ kustom.name }}.py"]
          securityContext:
            runAsUser: {{ kustom.security.runAsUser }}
          volumeMounts:
          - mountPath: /app/{{ kustom.name }}.py
            name: {{ kustom.name }}-config
            subPath: process_suricata_alerts.py
          - name: {{ kustom.name }}
            mountPath: /var/log
        - name: spider-collect
          image: {{ kustom.images['spider-collect'] }}
          env:
          - name: SURICATA_FLOWS
            value: /var/log/flows
          - name: ENRICHED_FLOWS
            value: /var/log/flows-enriched
          - name: INTERVAL
            value: "90"
          - name: ANTHROPIC_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: openrouter
          - name: GROQ
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: groq
          - name: ABUSEIPDB_KEY
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: abuseipdb
          - name: ABUSEIPDB_KEY
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: abuseipdb
          - name: URLHAUS
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: urlhaus
          command: ["/bin/sh", "-c"]
          args:
            - |
              instructions="You are a network security analyzer. Analyze the following network capture data.

              CRITICAL: Provide ONLY the result and a short description using the exact format below. Do not include any introductory text, greetings, markdown formatting outside of the keys, or long explanations. If you violate this, the output breaks my parser.

              Format:
              result: [One-word status, e.g., Safe, Suspicious, Malicious]
              desc: [A 2-4 word technical reason]

              Flows: "
              mkdir -p ${ENRICHED_FLOWS}
              while sleep "${INTERVAL}"; do
                echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) Asking AI..."
                touch "${ENRICHED_FLOWS}/ts" && sleep 5
                for flow in $(find "${SURICATA_FLOWS}/" -type f ! -newer "${ENRICHED_FLOWS}/ts"); do
                  [ -f "${flow}" ] || continue
                  base_flow=$(basename "${flow}")
                  payload=$(jq -n --arg system_content "$(echo "$instructions"; cat "$flow")" '{"model": "openai/gpt-oss-20b", #"llama-3.1-8b-instant",
                    "messages": [{"role": "system", "content": $system_content}]
                  }')
                  curl https://api.groq.com/openai/v1/chat/completions -H "Content-Type: application/json" -H "Authorization: Bearer ${GROQ}" \
                      -d "$payload" | jq .  > "${ENRICHED_FLOWS}/${base_flow%.json}.ai-2.json"
                  python3 /app/flow-information-collector.py "${flow}" "${ENRICHED_FLOWS}/${base_flow%.json}.enrichment.json"
                  mv "${flow}" "${ENRICHED_FLOWS}/"
                done
              done
          volumeMounts:
          - name: {{ kustom.name }}
            mountPath: /var/log
          - mountPath: /app/flow-information-collector.py
            name: {{ kustom.name }}-config
            subPath: flow-information-collector.py
        - name: api
          image: {{ kustom.images['fastapi'] }}
          env:
          - name: FLOWS_DIR
            value: /var/log/flows-enriched
          - name: PORT
            value: "{{ internal_port }}"
          - name: FLOWS_PUBLIC_KEY
            valueFrom:
              secretKeyRef:
                name: {{ kustom.name }}
                key: flows_public.pem
          command: ["python", "-u",  "/app/api.py"]
          ports:
          - containerPort: {{ internal_port }}
            name: api
          volumeMounts:
          - name: {{ kustom.name }}
            mountPath: /var/log
          - mountPath: /app/api.py
            name: {{ kustom.name }}-config
            subPath: api.py
