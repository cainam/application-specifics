- name: change ownership of a directory recursively
  vars:
    dest_base_dir: "{% if application.value.storage.type == 'local_folder' %}{{ local_disk_directory }}{% else %}{{ shared_mounts }}{% endif %}/{{ application.value.storage.name }}"
  ansible.builtin.file:
    path: "{{ dest_base_dir }}"
    owner: "{{ application.value.security.runAsUser }}"
    group: "{{ application.value.security.runAsGroup }}"
    state: directory
    recurse: yes

- name: change ownership of a directory recursively
  ansible.builtin.file:
    path: "{% if item.type == 'local_folder' %}{{ local_disk_directory }}{% else %}{{ shared_mounts }}{% endif %}/{{ item.name }}"
    state: directory
    owner: your_user
    group: your_group
    recurse: yes
  loop: "{{ application.value.storage }}"
