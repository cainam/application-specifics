apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: {{ kustom.namespace }}

resources:
  - https://raw.githubusercontent.com/traefik/traefik/v3.6/docs/content/reference/dynamic-configuration/kubernetes-crd-definition-v1.yml
  - https://raw.githubusercontent.com/traefik/traefik/v3.6/docs/content/reference/dynamic-configuration/kubernetes-crd-rbac.yml
  - service.yaml
  - serviceaccount.yaml
  - dashboard-ingressroute.yaml
  - Middleware-oauth2-proxy.yaml
  - Middleware-redirect-rewriter.yaml
  - deploy.yaml

secretGenerator:
- name: tls-{{ kustom.name }}
  files:
  - tls.crt=tls.crt
  - tls.key=tls.key
  type: "kubernetes.io/tls"
generatorOptions:
  disableNameSuffixHash: true

